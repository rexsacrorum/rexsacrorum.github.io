baseURL: 'https://sacrorum.com/'
locale: 'en-us'
title: 'Bogdan Novosad — Staff Software Engineer, AI Developer Tools'
copyright: "Copyright 2024 Bogdan Novosad"
defaultContentLanguage: "en"
enableGitInfo: true
enableRobotsTXT: true
googleAnalytics: "G-K4ZYFFEK0Q"
module:
    imports:
        path: "github.com/adityatelange/hugo-PaperMod"

languages:
    en:
      label: "English"
      weight: 1
      taxonomies:
        category: categories
        tag: tags
        # series: series
      # menu:
      #   main:
      #     - name: Archive
      #       url: archives
      #       weight: 5
      #     - name: Search
      #       url: search/
      #       weight: 10
      #     - name: Tags
      #       url: tags/
      #       weight: 10
outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Staff software engineer building AI developer tools, GliderMCP, and complex .NET/TypeScript systems for real-world production codebases."
  author: Bogdan Novosad
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  # comments: false
  # images: ["papermod-cover.png"]

  profileMode:
    enabled: false
    title: PaperMod
    imageUrl: "#"
    imageTitle: my image
    # imageWidth: 120
    # imageHeight: 120
    buttons:
        - name: Archives
          url: archives
        - name: Tags
          url: tags

  homeInfoParams:
    Title: "Staff Software Engineer building AI developer tools for real-world .NET codebases"
    Content: >
      I am Bogdan Novosad, a staff software engineer with 12+ years of experience building .NET/TypeScript systems, SaaS products, CI/CD workflows, and developer tooling for complex production codebases.

      I created GliderMCP: local MCP tools that give AI coding agents compiler-backed semantic navigation, diagnostics, runtime evidence, and safer refactoring workflows for C#/.NET and TypeScript/JavaScript projects.

      Open to Staff Software Engineer, AI Developer Tools, Developer Productivity / Platform, and Senior Backend .NET roles; full-time or B2B contract; especially US/global remote teams.

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/novosad/"
    - name: CV
      url: "/cv/"
    - name: GliderMCP
      url: "https://glidermcp.com/"
    - name: github
      url: "https://github.com/rexsacrorum"
    - name: telegram
      url: "https://t.me/rexsacrorum"
    - name: email
      url: "mailto:bogdan@sacrorum.com"

    - name: Rss
      url: "index.xml"

  # editPost:
  #       URL: "https://github.com/adityatelange/hugo-PaperMod/tree/exampleSite/content"
  #       Text: "Suggest Changes" # edit text
  #       appendFilePath: true # to append file path to Edit link

  # label:
  #     text: "Home"
  #     icon: icon.png
  #     iconHeight: 35

  # analytics:
  #     google:
  #         SiteVerificationTag: "XYZabc"

  assets:
      disableHLJS: true
      favicon: "favicon.ico"
      favicon16x16: "favicon-16x16.png"
      favicon32x32: "favicon-32x32.png"
      apple_touch_icon: "apple-touch-icon.png"
      maskIcon: "safari-pinned-tab.svg"

  # cover:
  #     hidden: true # hide everywhere but not in structured data
  #     hiddenInList: true # hide on list pages and home
  #     hiddenInSingle: true # hide on single page

  # fuseOpts:
  #     isCaseSensitive: false
  #     shouldSort: true
  #     location: 0
  #     distance: 1000
  #     threshold: 0.4
  #     minMatchCharLength: 0
  #     limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
  #     keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
      renderer:
          unsafe: true
  highlight:
      noClasses: false
      # anchorLineNos: true
      # codeFences: true
      # guessSyntax: true
      # lineNos: true
      # style: monokai

privacy:
    vimeo:
        disabled: false
        simple: true

    x:
        disabled: false
        enableDNT: true
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    x:
        disableInlineCSS: true
